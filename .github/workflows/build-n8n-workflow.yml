name: Gerar workflow n8n

on:
  push:
    branches: [main]
    paths:
      - 'n8n/source/workflow-rm-imobiliario-4-agentes.json.gz.b64'
      - 'n8n/build-workflow.mjs'
      - '.github/workflows/build-n8n-workflow.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Gerar e validar JSON
        run: node n8n/build-workflow.mjs

      - name: Publicar workflow atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add n8n/workflow-rm-imobiliario-4-agentes.json
          if ! git diff --cached --quiet; then
            git commit -m "Atualiza workflow n8n automaticamente"
            git push
          fi
